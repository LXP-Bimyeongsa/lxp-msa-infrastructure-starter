server:
  port: 8082

spring:
  datasource:
    # 서비스 전용 계정. member_db 외의 스키마에는 권한이 없다. (docs/DECISIONS.md D-09)
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_DB_PORT:3306}/member_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
    username: ${MYSQL_USER:member}
    password: ${MYSQL_PASSWORD:member}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      # 스키마는 infrastructure/mysql/init 의 SQL이 소유한다.
      # 애플리케이션이 DDL을 만들면 실제 스키마와 코드가 조용히 어긋난다.
      ddl-auto: validate
    open-in-view: false
  cloud:
    consul:
      discovery:
        # 호출 측(subscription-service)이 gRPC 포트를 찾는 경로.
        # HTTP 포트와 다르므로 메타데이터로 알려야 한다.
        metadata:
          grpc-port: "${GRPC_SERVER_PORT:9092}"

grpc:
  server:
    port: ${GRPC_SERVER_PORT:9092}
