server:
  port: 8085

spring:
  datasource:
    # 서비스 전용 계정. payment_db 외의 스키마에는 권한이 없다. (D-09)
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_DB_PORT:3306}/payment_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
    username: ${MYSQL_USER:payment}
    password: ${MYSQL_PASSWORD:payment}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      # 스키마 소유권은 infrastructure/mysql/init SQL에 있다.
      ddl-auto: validate
    open-in-view: false
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_AMQP_PORT:5672}
    username: ${RABBITMQ_USER:lxp}
    password: ${RABBITMQ_PASSWORD:lxp}
    publisher-confirm-type: correlated
    listener:
      simple:
        default-requeue-rejected: false

outbox:
  relay:
    exchange: payment.events
    poll-interval-ms: 1000

billing:
  # 정기 결제 주기 (D-25). 데모에서는 짧게 두고 확인한다.
  period-days: ${BILLING_PERIOD_DAYS:30}
  scheduler:
    enabled: ${BILLING_SCHEDULER_ENABLED:true}
    interval-ms: ${BILLING_SCHEDULER_INTERVAL_MS:60000}
  # 정기 결제 재시도 (D-37). 수치는 사업 정책이라 설정으로 뺀다.
  # 기본값 "3일 간격 3회" — 카드 한도가 풀릴 만한 시간을 준다.
  # max-attempts: 1로 두면 재시도 없이 즉시 중단(D-37 이전 동작)으로 돌아간다.
  dunning:
    max-attempts: ${BILLING_DUNNING_MAX_ATTEMPTS:3}
    retry-interval-seconds: ${BILLING_DUNNING_RETRY_SECONDS:259200}
