management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
    baggage:
      correlation:
        fields: request-id,user-id
      remote-fields: request-id,user-id
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}

spring:
  cloud:
    consul:
      discovery:
        prefer-ip-address: true
        health-check-path: /actuator/health
        health-check-interval: 10s

logging:
  level:
    root: INFO
  pattern:
    correlation: "[%X{traceId:-},%X{spanId:-}] "

# JWT — member-service가 발급, gateway가 검증 (D-04).
# 같은 HS256 시크릿을 양쪽이 공유해야 하므로 중앙 설정에 둔다.
# 아래 기본값은 로컬 개발 전용이다. 운영에서는 JWT_SECRET 환경변수로 반드시 교체한다.
jwt:
  secret: ${JWT_SECRET:lxp-local-dev-only-secret-change-me-0123456789}
  access-token-ttl-seconds: ${JWT_TTL_SECONDS:3600}
