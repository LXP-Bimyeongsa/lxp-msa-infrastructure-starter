management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
    baggage:
      correlation:
        fields: request-id,user-id
      remote-fields: request-id,user-id
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}

spring:
  cloud:
    consul:
      discovery:
        prefer-ip-address: true
        health-check-path: /actuator/health
        health-check-interval: 10s
        # 헬스체크를 통과한 인스턴스만 호출 대상으로 삼는다 (D-43).
        #
        # 기본값이 false다 — 즉 디스커버리가 critical 인스턴스까지 전부 돌려주고
        # 로드밸런서가 죽은 것과 산 것을 번갈아 고른다. 컨테이너를 재생성한 직후
        # 실제로 gateway가 죽은 course-service로 보내 500이 났다(P-19).
        # "GET은 되는데 POST는 안 되는" 것처럼 보여 원인을 엉뚱한 데서 찾게 된다.
        query-passing: true
        # critical 상태가 이만큼 지속되면 Consul이 등록을 스스로 지운다.
        # 없으면 죽은 등록이 영영 남아 목록을 오염시킨다(실제로 수동 deregister로 치웠다).
        #
        # 헬스체크 간격(10s)보다 넉넉히 잡는다 — 재기동 중 잠깐 critical이 된
        # 멀쩡한 인스턴스까지 지워버리면 복구 후 다시 등록될 때까지 빈다.
        health-check-critical-timeout: 1m

server:
  # 종료 시 Consul 등록을 스스로 해제할 시간을 준다 (D-53).
  #
  # 없으면 SIGTERM에 즉시 죽어 해제 훅이 돌지 못하고, 등록이 그대로 남는다.
  # instance-id가 컨테이너마다 고정이라(HOSTNAME) 재기동하면 같은 항목을
  # 덮어쓰지만, 컨테이너를 새로 만들면 옛 항목이 남는다. D-43의 자동 해제는
  # critical이 된 뒤에야 걷어내므로 그 사이 목록이 오염된다.
  shutdown: graceful

spring.lifecycle.timeout-per-shutdown-phase: 20s

logging:
  level:
    root: INFO
  pattern:
    correlation: "[%X{traceId:-},%X{spanId:-}] "

# 서비스 간 호출 검증 (D-33).
# gateway가 붙인 서비스 토큰을 다운스트림이 확인한다. 이 설정을 읽는 것은
# common-security 모듈이고, 그 모듈을 의존하지 않는 gateway·config-server는 무시한다.
#
# issuer-uri가 아니라 jwk-set-uri로 설정하는 이유 — issuer는 토큰에 박히는
# 외부 주소라 컨테이너 안에서 조회하면 자기 자신을 가리킨다 (P-09).
internal-auth:
  issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/lxp}
  jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8180/realms/lxp/protocol/openid-connect/certs}
  audience: ${INTERNAL_AUDIENCE:lxp-internal}
