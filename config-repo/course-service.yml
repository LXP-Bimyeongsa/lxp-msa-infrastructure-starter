server:
  port: 8083

spring:
  data:
    mongodb:
      uri: mongodb://${MONGO_HOST:localhost}:${MONGO_DB_PORT:27017}/course_db?replicaSet=rs0
      auto-index-creation: true

minio:
  bucket: ${MINIO_BUCKET:course-videos}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}

  # 서버가 직접 호출할 때 쓰는 주소 (도커 네트워크 내부)
  internal-endpoint: ${MINIO_INTERNAL_ENDPOINT:http://localhost:9000}

  # presigned URL 서명에 쓰는 주소.
  # presigned URL은 호스트를 포함해 서명되므로 여기에 내부 주소를 넣으면
  # 브라우저가 그 URL을 열 수 없다. 반드시 "클라이언트가 접속할 주소"여야 한다.
  public-endpoint: ${MINIO_PUBLIC_ENDPOINT:http://localhost:9000}

  # 업로드는 짧게, 재생은 조금 길게
  upload-url-ttl-seconds: ${MINIO_UPLOAD_TTL:600}
  playback-url-ttl-seconds: ${MINIO_PLAYBACK_TTL:3600}
