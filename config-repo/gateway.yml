server:
  port: 8080


spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:
            # 인증은 member-service가 담당한다(D-04). Gateway는 JWT 검증만.
            - id: member-service
              uri: lb://member-service
              predicates:
                - Path=/api/members/**,/api/auth/**
            - id: course-service
              uri: lb://course-service
              predicates:
                - Path=/api/courses/**
            - id: subscription-service
              uri: lb://subscription-service
              predicates:
                - Path=/api/subscriptions/**
            - id: payment-service
              uri: lb://payment-service
              predicates:
                - Path=/api/payments/**

# Keycloak 토큰 검증 (D-20)
keycloak:
  # 토큰의 iss와 반드시 같아야 한다. 클라이언트가 접속하는 외부 주소다. (P-09)
  issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/lxp}
  # JWKS는 gateway가 직접 가져오므로 내부에서 접근 가능한 주소여야 한다.
  jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8180/realms/lxp/protocol/openid-connect/certs}
  # 서비스 토큰 발급 (D-33). 다운스트림에 "gateway를 거쳤다"를 증명하는 데 쓴다.
  # 토큰 발급도 컨테이너 안에서 하므로 내부 주소다.
  service-token:
    token-uri: ${KEYCLOAK_TOKEN_URI:http://localhost:8180/realms/lxp/protocol/openid-connect/token}
    client-id: ${KEYCLOAK_GATEWAY_CLIENT_ID:lxp-gateway}
    client-secret: ${KEYCLOAK_GATEWAY_CLIENT_SECRET:lxp-gateway-secret}
  # 탈퇴·차단된 회원의 토큰을 만료 전에 걸러낸다 (D-35, P-17).
  # 끄면 D-32의 잔여 구멍(토큰 수명만큼 통과)이 그대로 돌아온다.
  introspection:
    enabled: ${KEYCLOAK_INTROSPECTION_ENABLED:true}
    uri: ${KEYCLOAK_INTROSPECTION_URI:http://localhost:8180/realms/lxp/protocol/openid-connect/token/introspect}
    # 노출 창 = 이 값. 짧을수록 안전하고 Keycloak 부하가 는다.
    cache-ttl-seconds: ${KEYCLOAK_INTROSPECTION_CACHE_TTL:30}
