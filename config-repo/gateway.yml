server:
  port: 8080


spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:
            # 인증은 member-service가 담당한다(D-04). Gateway는 JWT 검증만.
            - id: member-service
              uri: lb://member-service
              predicates:
                - Path=/api/members/**,/api/auth/**
            - id: course-service
              uri: lb://course-service
              predicates:
                - Path=/api/courses/**
            - id: subscription-service
              uri: lb://subscription-service
              predicates:
                - Path=/api/subscriptions/**
            - id: payment-service
              uri: lb://payment-service
              predicates:
                - Path=/api/payments/**
