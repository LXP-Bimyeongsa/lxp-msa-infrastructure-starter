# Jenkins Configuration as Code (D-40)
#
# 잡·보안·폴링 주기를 전부 여기서 정의한다. UI로 만들면 컨테이너 볼륨을 지우는 순간
# 사라지고, 저장소에는 아무 흔적도 남지 않는다. 이 프로젝트에서 이미 두 번
# "볼륨 지우니 설정이 날아감"을 겪었다(MySQL init, Keycloak realm).

jenkins:
  systemMessage: "LXP MSA 빌드 파이프라인 — 설정은 ci/jenkins.yaml이 소유한다"

  # 로컬 학습용이라 Jenkins 자체 계정을 쓴다.
  # 비밀번호는 환경변수로 주입한다 — 여기 적으면 저장소에 평문으로 남는다.
  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "${JENKINS_ADMIN_ID}"
          password: "${JENKINS_ADMIN_PASSWORD}"

  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false

  # 빌드는 컨트롤러에서 돈다. 에이전트를 붙이면 docker.sock 공유를
  # 에이전트까지 확장해야 해서, 로컬 단일 노드에서는 이득이 없다.
  numExecutors: 2

# 레지스트리 자격증명 (D-50).
#
# 값은 환경변수로 주입한다 — 여기 적으면 저장소에 평문으로 남는다.
# Jenkinsfile은 이 id로만 참조하고 실제 값은 모른다.
credentials:
  system:
    domainCredentials:
      - credentials:
          - usernamePassword:
              scope: GLOBAL
              id: "registry-credentials"
              description: "이미지 레지스트리 push 계정"
              username: "${REGISTRY_USERNAME}"
              password: "${REGISTRY_PASSWORD}"

unclassified:
  location:
    # 빌드 링크에 쓰인다. 비워두면 Jenkins가 경고를 띄운다.
    #
    # webhook을 쓰는 동안에는 외부에서 닿는 주소를 넣는다 (D-47).
    # cloudflared 무료 터널은 실행할 때마다 주소가 바뀌므로 환경변수로 뺐다 —
    # 여기에 박아두면 터널을 다시 켤 때마다 이 파일을 고쳐야 한다.
    url: "${JENKINS_URL:-http://localhost:9080/}"

jobs:
  - script: |
      pipelineJob('lxp-msa-pipeline') {
        description('''
          변경된 서비스만 골라 빌드한다. 파이프라인 정의는 저장소의 ci/Jenkinsfile에 있다.

          GitHub webhook으로 트리거된다 (D-47). 공인 IP가 없으므로
          cloudflared 터널로 외부 주소를 만들어 GitHub가 찾아올 수 있게 한다.
          터널이 꺼져 있으면 아무 빌드도 돌지 않는다 — 폴링과 다른 점이다.
        '''.stripIndent())

        // webhook(즉시) + 폴링(안전망 4시간). Jenkinsfile과 같은 값을 둔다.
        //
        // 잡에도 두는 이유 — Jenkinsfile의 triggers는 "한 번 빌드된 뒤"에야
        // 적용된다. 여기에 없으면 첫 빌드를 수동으로 돌리기 전까지 트리거가
        // 하나도 걸리지 않는다.
        //
        // 폴링을 다시 넣은 이유는 D-51 참고 — 터널이 끊기면 webhook은
        // 조용히 멈춘다. 실제로 그래서 머지된 커밋이 빌드되지 않고 남았다.
        triggers {
          githubPush()
          scm('H H/4 * * *')
        }

        definition {
          cpsScm {
            scm {
              git {
                remote {
                  // public 저장소라 자격증명이 필요 없다.
                  // private으로 바뀌면 credentialsId를 여기에 붙인다.
                  url('https://github.com/LXP-Bimyeongsa/lxp-msa-infrastructure-starter.git')
                }
                branch('*/main')
              }
            }
            scriptPath('ci/Jenkinsfile')
            // false여야 전체 체크아웃이 된다. true(lightweight)는 Jenkinsfile만
            // 가져오는데, 그러면 gradle 빌드할 소스가 없다.
            lightweight(false)
          }
        }
      }
