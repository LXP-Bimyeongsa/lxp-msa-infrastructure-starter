# 알림 규칙 (D-54)
#
# 이 프로젝트에서 실제로 겪은 장애를 기준으로 골랐다. 일반적인
# "CPU 80%" 같은 것보다, 여기서 조용히 지나갔던 것을 잡는 편이 값이 크다.
#
# ① 서비스 다운   — D-44에서 Zipkin이 44분간 죽어 있었는데 아무도 몰랐다
# ② 서킷 열림     — D-17·D-34의 fail-closed가 실제로 발동한 상태
# ③ 5xx 증가      — D-42처럼 오분류된 응답이 늘어나는 것을 본다

apiVersion: 1

groups:
  - orgId: 1
    name: lxp-service-health
    folder: LXP
    interval: 1m
    rules:

      - uid: lxp-service-down
        title: 서비스 다운
        condition: threshold
        for: 2m
        annotations:
          summary: '{{ $labels.instance }} 가 2분째 스크레이프에 응답하지 않는다'
          description: 컨테이너가 죽었거나 헬스 엔드포인트가 막혔다. docker ps 와 로그를 먼저 본다.
        labels:
          severity: critical
        data:
          - refId: query
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: lxp-prometheus
            model:
              editorMode: code
              expr: up{job="lxp-docker-services"}
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: query
          - refId: threshold
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator: { params: [1], type: lt }
                  operator: { type: and }
                  query: { params: [query] }
                  reducer: { params: [], type: last }
                  type: query
              expression: query
              intervalMs: 1000
              maxDataPoints: 43200
              refId: threshold
              type: threshold
        isPaused: false
        # 스크레이프 대상이 사라지면 시계열도 사라진다. 그때 알림을
        # 조용히 끄면 "죽었다"를 놓치므로 Alerting으로 유지한다.
        noDataState: Alerting
        execErrState: Error

      - uid: lxp-circuit-open
        title: 서킷브레이커 열림
        condition: threshold
        for: 1m
        annotations:
          summary: '{{ $labels.name }} 서킷이 열렸다'
          description: 다운스트림 호출이 차단되고 있다. fail-closed라 해당 요청은 503으로 거절된다(D-18).
        labels:
          severity: critical
        data:
          - refId: query
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: lxp-prometheus
            model:
              editorMode: code
              expr: resilience4j_circuitbreaker_state{state="open"}
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: query
          - refId: threshold
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator: { params: [0], type: gt }
                  operator: { type: and }
                  query: { params: [query] }
                  reducer: { params: [], type: last }
                  type: query
              expression: query
              intervalMs: 1000
              maxDataPoints: 43200
              refId: threshold
              type: threshold
        isPaused: false
        # 서킷이 닫혀 있으면 state="open" 시계열이 0으로 존재한다.
        # 값이 아예 없는 것은 아직 호출이 없었다는 뜻이라 알릴 일이 아니다.
        noDataState: OK
        execErrState: Error

      - uid: lxp-5xx-rate
        title: 5xx 응답 증가
        condition: threshold
        for: 3m
        annotations:
          summary: '{{ $labels.instance }} 의 5xx가 분당 1건을 넘는다'
          description: 서버 오류가 지속되고 있다. 로그에서 원인 예외를 확인한다(D-47 이후 cause가 남는다).
        labels:
          severity: warning
        data:
          - refId: query
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: lxp-prometheus
            model:
              editorMode: code
              expr: sum by (instance) (rate(http_server_requests_seconds_count{status=~"5.."}[5m])) * 60
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: query
          - refId: threshold
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator: { params: [1], type: gt }
                  operator: { type: and }
                  query: { params: [query] }
                  reducer: { params: [], type: last }
                  type: query
              expression: query
              intervalMs: 1000
              maxDataPoints: 43200
              refId: threshold
              type: threshold
        isPaused: false
        noDataState: OK
        execErrState: Error
