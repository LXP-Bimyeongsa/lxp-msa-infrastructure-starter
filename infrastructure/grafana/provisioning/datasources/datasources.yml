apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    # uid를 고정한다 (D-54). 알림 규칙이 datasourceUid로 참조하는데,
    # 비워두면 Grafana가 매번 임의 값을 만들어 규칙이 데이터소스를 잃는다.
    uid: lxp-prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: true

  - name: Zipkin
    type: zipkin
    access: proxy
    url: http://zipkin:9411
    editable: true
