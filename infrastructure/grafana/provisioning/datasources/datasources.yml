apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    # uid를 고정한다 (D-54). 알림 규칙이 datasourceUid로 참조하는데,
    # 비워두면 Grafana가 매번 임의 값을 만들어 규칙이 데이터소스를 잃는다.
    uid: lxp-prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true

  - name: Loki
    type: loki
    # Prometheus와 같은 이유로 고정한다 (D-60). 비워두면 Grafana가
    # 임의 값을 만들어 대시보드 패널이 데이터소스를 잃는다.
    uid: lxp-loki
    access: proxy
    url: http://loki:3100
    editable: true

  - name: Zipkin
    type: zipkin
    # 나머지 둘과 같은 이유로 고정한다 (D-62). 지금은 이 데이터소스를
    # 쓰는 패널이 없어 티가 안 날 뿐이고, 붙이는 순간 같은 문제가 난다.
    uid: lxp-zipkin
    access: proxy
    url: http://zipkin:9411
    editable: true
