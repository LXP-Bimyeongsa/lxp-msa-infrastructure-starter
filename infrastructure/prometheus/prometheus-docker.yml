global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: "lxp-docker-services"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - "config-server:8888"
          - "gateway:8080"
          - "member-service:8082"
          - "course-service:8083"
          - "subscription-service:8084"
          - "payment-service:8085"
