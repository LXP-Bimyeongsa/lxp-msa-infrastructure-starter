# 테스트는 H2 인메모리 + RabbitMQ 미접속으로 돌린다.
spring:
  config:
    import: "optional:configserver:"
  cloud:
    consul:
      enabled: false
      discovery:
        enabled: false
  datasource:
    url: jdbc:h2:mem:subscription_db;MODE=MySQL;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
  rabbitmq:
    listener:
      simple:
        # 리스너가 브로커 연결을 시도하지 않게 한다
        auto-startup: false

outbox:
  relay:
    # 릴레이 스케줄러 비활성 — 브로커 없이 outbox 기록만 검증한다
    enabled: false
    exchange: subscription.events

management:
  zipkin:
    tracing:
      export:
        enabled: false

# 서비스 토큰 검증 (D-33) — 테스트는 HTTP를 거치지 않으므로 실제 조회는 일어나지 않는다.
# 다만 JwtDecoder 빈 생성에 값이 필요해서 채워 둔다.
internal-auth:
  issuer-uri: http://localhost:8180/realms/lxp
  jwk-set-uri: http://localhost:8180/realms/lxp/protocol/openid-connect/certs
  audience: lxp-internal
  # member gRPC 호출용 서비스 토큰 (D-34).
  # MemberClient가 이 빈을 요구하므로 값이 있어야 컨텍스트가 뜬다.
  # 테스트는 MemberClient를 모킹하므로 실제 발급은 일어나지 않는다.
  client:
    token-uri: http://localhost:8180/realms/lxp/protocol/openid-connect/token
    client-id: subscription-service
    client-secret: test-only
