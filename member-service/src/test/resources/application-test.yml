# 테스트는 H2 인메모리로 돌린다.
# DB 컨테이너나 Consul/config-server 없이 CI에서 실행되어야 한다.
spring:
  config:
    import: "optional:configserver:"
  cloud:
    consul:
      enabled: false
      discovery:
        enabled: false
  datasource:
    url: jdbc:h2:mem:member_db;MODE=MySQL;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      # 운영은 init SQL이 스키마를 소유하지만(validate), 테스트에서는
      # H2를 쓰므로 엔티티로부터 생성한다.
      ddl-auto: create-drop
    open-in-view: false
  rabbitmq:
    listener:
      simple:
        # 리스너가 브로커 연결을 시도하지 않게 한다
        auto-startup: false

outbox:
  relay:
    # 릴레이 스케줄러 비활성 — 브로커 없이 outbox 기록만 검증한다
    enabled: false
    exchange: member.events

management:
  zipkin:
    tracing:
      export:
        enabled: false

# 테스트 전용 시크릿 (32바이트 이상)
jwt:
  secret: test-only-secret-not-for-production-0123456789
  access-token-ttl-seconds: 3600

grpc:
  server:
    # 0 = 임의의 빈 포트. 고정 포트를 쓰면 같은 머신에서 컨테이너가 떠 있을 때
    # BindException으로 테스트가 통째로 실패한다.
    port: 0

# 서비스 토큰 검증 (D-33) — 테스트는 HTTP를 거치지 않으므로 실제 조회는 일어나지 않는다.
# 다만 JwtDecoder 빈 생성에 값이 필요해서 채워 둔다.
internal-auth:
  issuer-uri: http://localhost:8180/realms/lxp
  jwk-set-uri: http://localhost:8180/realms/lxp/protocol/openid-connect/certs
  audience: lxp-internal
