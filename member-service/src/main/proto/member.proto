syntax = "proto3";

package lxp.member.v1;

option java_multiple_files = true;
option java_package = "com.lcs.member.grpc";
option java_outer_classname = "MemberProto";

// 계약 원본은 제공 서비스(member-service)가 소유한다. (docs/DECISIONS.md D-12)
// 호출 측(subscription-service)은 이 파일의 복사본을 가지며,
// 원본을 바꾸는 PR은 복사본 갱신을 같은 PR에 포함해야 한다.
//
// 하위 호환을 깨는 변경(필드 번호 재사용·삭제)은 금지. 새 필드는 추가만.
service MemberQueryService {
  // 구독 생성 시 회원이 실제로 존재하고 활성 상태인지 확인한다.
  rpc GetMember(GetMemberRequest) returns (GetMemberResponse);
}

message GetMemberRequest {
  int64 member_id = 1;
}

message GetMemberResponse {
  int64 member_id = 1;
  string email = 2;
  // ACTIVE | WITHDRAWN
  string status = 3;
  bool active = 4;
}
