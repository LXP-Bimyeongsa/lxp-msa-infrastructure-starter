# 데이터 · 메시징 인프라
#
# MySQL(스키마 3개) · MongoDB(단일노드 RS) · MinIO · RabbitMQ.
# 서비스 개발 시 compose.infra.yaml과 함께 띄운다.
#
#   docker compose -f compose.infra.yaml -f compose.data.yaml up -d
#
# 운영 확장 시 RabbitMQ ×3 Quorum / MongoDB RS ×3로 늘린다. (docs/DECISIONS.md D-10, D-14)

services:

  mysql:
    image: mysql:8.4
    container_name: lxp-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    ports:
      # 호스트에 이미 MySQL이 떠 있으면 .env에서 MYSQL_PORT를 바꾼다.
      # 컨테이너끼리는 mysql:3306으로 통신하므로 영향 없다.
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      # *.sql은 최초 기동(데이터 디렉터리가 빈 상태)에만 파일명 순서대로 실행된다.
      # 스크립트를 고쳤다면 볼륨을 지워야 다시 반영된다.
      - ./infrastructure/mysql/init:/docker-entrypoint-initdb.d:ro
    networks: [lxp-net]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  mongo:
    image: mongo:7.0
    container_name: lxp-mongo
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo-data:/data/db
      # docker-entrypoint-initdb.d 로 rs.initiate를 실행하면 안 된다.
      # 그 시점의 mongod는 네트워크가 아닌 로컬 소켓에만 붙어 있어서
      # "mongo:27017"을 자기 자신으로 인식하지 못하고 NodeNotFound로 죽는다.
      # ReplicaSet 초기화는 아래 mongo-init 잡이 기동 후에 수행한다.
    networks: [lxp-net]
    healthcheck:
      # RS가 초기화돼야 트랜잭션이 되므로 ping이 아니라 RS 상태를 본다.
      test: ["CMD", "mongosh", "--quiet", "--eval", "rs.status().ok"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  # mongo는 기동 후 rs.initiate()가 한 번 실행돼야 한다.
  # docker-entrypoint-initdb.d는 --replSet 모드에서 신뢰하기 어려워 별도 잡으로 처리한다.
  mongo-init:
    image: mongo:7.0
    container_name: lxp-mongo-init
    depends_on:
      - mongo
    volumes:
      - ./infrastructure/mongo/init:/init:ro
    entrypoint:
      - sh
      - -c
      - |
        until mongosh --host mongo:27017 --quiet --eval "db.adminCommand('ping')" >/dev/null 2>&1; do sleep 2; done
        mongosh --host mongo:27017 --quiet /init/01-replicaset.js
    networks: [lxp-net]
    restart: "no"

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: lxp-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_PORT:-9000}:9000"           # S3 API
      - "${MINIO_CONSOLE_PORT:-9001}:9001"   # 콘솔
    volumes:
      - minio-data:/data
    networks: [lxp-net]
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  minio-init:
    image: minio/mc:RELEASE.2024-11-21T17-21-54Z
    container_name: lxp-minio-init
    depends_on:
      - minio
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - ./infrastructure/minio/init:/init:ro
    entrypoint: ["/bin/sh", "/init/create-buckets.sh"]
    networks: [lxp-net]
    restart: "no"

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: lxp-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-lxp}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-lxp}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"        # AMQP
      - "${RABBITMQ_UI_PORT:-15672}:15672"   # 관리 UI
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
      - ./infrastructure/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
      - ./infrastructure/rabbitmq/rabbitmq.conf:/etc/rabbitmq/conf.d/20-lxp.conf:ro
    networks: [lxp-net]
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

networks:
  lxp-net:
    name: lxp-net
    driver: bridge

volumes:
  mysql-data:
  mongo-data:
  minio-data:
  rabbitmq-data:
