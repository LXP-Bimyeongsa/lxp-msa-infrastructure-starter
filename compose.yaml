# 전체 스택 = 인프라 + 데이터/메시징 + 모든 서비스
#
# 데이터 계층은 compose.data.yaml에 정의돼 있고 여기서 include한다.
# 중복 정의하면 두 파일이 조용히 어긋난다.
include:
  - compose.data.yaml

services:

  consul-1:
    image: hashicorp/consul:1.18
    container_name: lxp-consul-1
    command: agent -server -ui -node=consul-1 -bootstrap-expect=3 -client=0.0.0.0 -retry-join=consul-2 -retry-join=consul-3
    ports:
      - "8500:8500"
    networks: [lxp-net]
    healthcheck:
      test: ["CMD", "consul", "members"]
      interval: 10s
      timeout: 5s
      retries: 10

  consul-2:
    image: hashicorp/consul:1.18
    container_name: lxp-consul-2
    command: agent -server -node=consul-2 -bootstrap-expect=3 -client=0.0.0.0 -retry-join=consul-1 -retry-join=consul-3
    networks: [lxp-net]

  consul-3:
    image: hashicorp/consul:1.18
    container_name: lxp-consul-3
    command: agent -server -node=consul-3 -bootstrap-expect=3 -client=0.0.0.0 -retry-join=consul-1 -retry-join=consul-2
    networks: [lxp-net]


  prometheus:
    image: prom/prometheus:v3.1.0
    container_name: lxp-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./infrastructure/prometheus/prometheus-docker.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks: [lxp-net]

  grafana:
    image: grafana/grafana:11.4.0
    container_name: lxp-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
    networks: [lxp-net]

  loki:
    image: grafana/loki:3.3.2
    container_name: lxp-loki
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./infrastructure/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"
    networks: [lxp-net]

  alloy:
    image: grafana/alloy:latest
    container_name: lxp-alloy
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
    volumes:
      - ./infrastructure/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - ./infrastructure/logs:/var/log/lxp:ro
      - alloy-data:/var/lib/alloy/data
    ports:
      - "12345:12345"
    depends_on:
      - loki
    networks: [lxp-net]

  zipkin:
    image: openzipkin/zipkin:3.4
    container_name: lxp-zipkin
    ports:
      - "9411:9411"
    networks: [lxp-net]


  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: lxp-keycloak
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      # 토큰의 iss는 클라이언트가 접속한 주소 기준으로 발급된다.
      # 이 값과 gateway의 issuer-uri가 어긋나면 검증이 전부 401이 된다 (P-09).
      KC_HOSTNAME: ${KEYCLOAK_PUBLIC_URL:-http://localhost:8180}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
    ports:
      - "${KEYCLOAK_PORT:-8180}:8080"
    volumes:
      - ./infrastructure/keycloak:/opt/keycloak/data/import:ro
      - keycloak-data:/opt/keycloak/data
    networks: [lxp-net]
    healthcheck:
      # 26.x는 관리 포트(9000)에서 헬스를 제공한다.
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/9000 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '\"status\": \"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  gateway:
    build:
      context: .
      dockerfile: ./gateway/Dockerfile
    container_name: lxp-gateway
    environment:
      CONSUL_HOST: consul-1
      CONSUL_PORT: 8500
      LOG_DIR: /logs
      CONFIG_SERVER_URL: http://config-server:8888
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
      # issuer는 토큰에 박힌 외부 주소, JWKS는 컨테이너에서 닿는 내부 주소.
      # 둘을 같게 두면 JWKS를 못 가져오거나 iss 불일치로 401이 난다 (P-09).
      KEYCLOAK_ISSUER_URI: ${KEYCLOAK_PUBLIC_URL:-http://localhost:8180}/realms/lxp
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/lxp/protocol/openid-connect/certs
      # 서비스 토큰 발급 (D-33). 발급도 컨테이너 안에서 하므로 내부 주소다.
      KEYCLOAK_TOKEN_URI: http://keycloak:8080/realms/lxp/protocol/openid-connect/token
      KEYCLOAK_GATEWAY_CLIENT_ID: lxp-gateway
      KEYCLOAK_GATEWAY_CLIENT_SECRET: ${KEYCLOAK_GATEWAY_CLIENT_SECRET:-lxp-gateway-secret}
      # 탈퇴 회원의 잔여 토큰 차단 (D-35). 조회도 컨테이너 안에서 하므로 내부 주소다.
      KEYCLOAK_INTROSPECTION_URI: http://keycloak:8080/realms/lxp/protocol/openid-connect/token/introspect
      KEYCLOAK_INTROSPECTION_ENABLED: ${KEYCLOAK_INTROSPECTION_ENABLED:-true}
      KEYCLOAK_INTROSPECTION_CACHE_TTL: ${KEYCLOAK_INTROSPECTION_CACHE_TTL:-30}
    ports:
      - "8080:8080"
    volumes:
      - ./infrastructure/logs:/logs
    depends_on:
      consul-1:
        condition: service_healthy
      config-server:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks: [lxp-net]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  config-server:
    build:
      context: .
      dockerfile: ./config-server/Dockerfile
    container_name: lxp-config-server
    environment:
      CONSUL_HOST: consul-1
      CONSUL_PORT: 8500
      LOG_DIR: /logs
      CONFIG_SEARCH_LOCATIONS: file:/config-repo
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
    ports:
      - "8888:8888"
    volumes:
      - ./infrastructure/logs:/logs
      - ./config-repo:/config-repo:ro
    depends_on:
      consul-1:
        condition: service_healthy
    networks: [lxp-net]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8888/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  member-service:
    build:
      context: .
      dockerfile: ./member-service/Dockerfile
    container_name: lxp-member-service
    environment:
      CONSUL_HOST: consul-1
      CONSUL_PORT: 8500
      LOG_DIR: /logs
      CONFIG_SERVER_URL: http://config-server:8888
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
      # 컨테이너끼리는 항상 내부 포트 3306으로 통신한다.
      # 호스트 포트(MYSQL_PORT)와는 무관하다.
      MYSQL_HOST: mysql
      MYSQL_DB_PORT: 3306
      MYSQL_USER: member
      MYSQL_PASSWORD: member
      # 회원탈퇴 사가(D-31) — MemberWithdrawn을 member.events로 발행한다.
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_AMQP_PORT: 5672
      RABBITMQ_USER: lxp
      RABBITMQ_PASSWORD: lxp
      GRPC_SERVER_PORT: 9092
      # issuer는 토큰에 박히는 외부 주소, Admin API·JWKS는 내부 주소 (P-09)
      KEYCLOAK_ISSUER_URI: ${KEYCLOAK_PUBLIC_URL:-http://localhost:8180}/realms/lxp
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/lxp/protocol/openid-connect/certs
      KEYCLOAK_ADMIN_SERVER_URL: http://keycloak:8080
      KEYCLOAK_REALM: lxp
      KEYCLOAK_CLIENT_ID: member-service
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_MEMBER_CLIENT_SECRET:-member-service-secret}
    ports:
      - "8082:8082"
      - "9092:9092"   # gRPC (subscription-service가 호출)
    volumes:
      - ./infrastructure/logs:/logs
    depends_on:
      consul-1:
        condition: service_healthy
      config-server:
        condition: service_healthy
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks: [lxp-net]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8082/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  course-service:
    build:
      context: .
      dockerfile: ./course-service/Dockerfile
    container_name: lxp-course-service
    environment:
      CONSUL_HOST: consul-1
      CONSUL_PORT: 8500
      LOG_DIR: /logs
      CONFIG_SERVER_URL: http://config-server:8888
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
      MONGO_HOST: mongo
      MONGO_DB_PORT: 27017
      # 서버가 객체 존재를 확인할 때 쓰는 내부 주소
      MINIO_INTERNAL_ENDPOINT: http://minio:9000
      # presigned URL 서명 주소 — 브라우저가 접속할 주소여야 한다.
      # 내부 주소로 서명하면 URL이 도커 밖에서 열리지 않는다.
      MINIO_PUBLIC_ENDPOINT: http://localhost:${MINIO_PORT:-9000}
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      # 서비스 토큰 검증 (D-33). issuer는 외부 주소, JWKS는 내부 주소 (P-09)
      KEYCLOAK_ISSUER_URI: ${KEYCLOAK_PUBLIC_URL:-http://localhost:8180}/realms/lxp
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/lxp/protocol/openid-connect/certs
      # 구독 상태 이벤트 소비 (D-36)
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_AMQP_PORT: 5672
      RABBITMQ_USER: lxp
      RABBITMQ_PASSWORD: lxp
    ports:
      - "8083:8083"
    volumes:
      - ./infrastructure/logs:/logs
    depends_on:
      consul-1:
        condition: service_healthy
      config-server:
        condition: service_healthy
      mongo:
        condition: service_healthy
      minio:
        condition: service_healthy
      # 구독 상태 이벤트 소비 (D-36)
      rabbitmq:
        condition: service_healthy
    networks: [lxp-net]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8083/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  subscription-service:
    build:
      context: .
      dockerfile: ./subscription-service/Dockerfile
    container_name: lxp-subscription-service
    environment:
      CONSUL_HOST: consul-1
      CONSUL_PORT: 8500
      LOG_DIR: /logs
      CONFIG_SERVER_URL: http://config-server:8888
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
      MYSQL_HOST: mysql
      MYSQL_DB_PORT: 3306
      MYSQL_USER: subscription
      MYSQL_PASSWORD: subscription
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_AMQP_PORT: 5672
      # 서비스 토큰 검증 (D-33). issuer는 외부 주소, JWKS는 내부 주소 (P-09)
      KEYCLOAK_ISSUER_URI: ${KEYCLOAK_PUBLIC_URL:-http://localhost:8180}/realms/lxp
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/lxp/protocol/openid-connect/certs
      # member gRPC 호출에 붙일 서비스 토큰 발급 (D-34)
      KEYCLOAK_TOKEN_URI: http://keycloak:8080/realms/lxp/protocol/openid-connect/token
      INTERNAL_CLIENT_ID: subscription-service
      INTERNAL_CLIENT_SECRET: ${KEYCLOAK_SUBSCRIPTION_CLIENT_SECRET:-subscription-service-secret}
    ports:
      - "8084:8084"
    volumes:
      - ./infrastructure/logs:/logs
    depends_on:
      consul-1:
        condition: service_healthy
      config-server:
        condition: service_healthy
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      # 첫 구독 요청 전에 서비스 토큰을 받을 수 있어야 한다 (D-34)
      keycloak:
        condition: service_healthy
    networks: [lxp-net]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8084/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  payment-service:
    build:
      context: .
      dockerfile: ./payment-service/Dockerfile
    container_name: lxp-payment-service
    environment:
      CONSUL_HOST: consul-1
      CONSUL_PORT: 8500
      LOG_DIR: /logs
      CONFIG_SERVER_URL: http://config-server:8888
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
      MYSQL_HOST: mysql
      MYSQL_DB_PORT: 3306
      MYSQL_USER: payment
      MYSQL_PASSWORD: payment
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_AMQP_PORT: 5672
      # 정기 결제 (D-25). 데모로 짧은 주기를 보려면 .env에서 조정한다.
      BILLING_PERIOD_DAYS: ${BILLING_PERIOD_DAYS:-30}
      BILLING_SCHEDULER_ENABLED: ${BILLING_SCHEDULER_ENABLED:-true}
      BILLING_SCHEDULER_INTERVAL_MS: ${BILLING_SCHEDULER_INTERVAL_MS:-60000}
      # 정기 결제 재시도 (D-37). 데모로 짧게 보려면 .env에서 조정한다.
      BILLING_DUNNING_MAX_ATTEMPTS: ${BILLING_DUNNING_MAX_ATTEMPTS:-3}
      BILLING_DUNNING_RETRY_SECONDS: ${BILLING_DUNNING_RETRY_SECONDS:-259200}
      # PG 연동 (D-39). 목 PG는 컨테이너 안에서 부르므로 내부 주소다.
      PG_BASE_URL: http://mock-pg:8080
      PG_TIMEOUT_MS: ${PG_TIMEOUT_MS:-3000}
      # 서비스 토큰 검증 (D-33). issuer는 외부 주소, JWKS는 내부 주소 (P-09)
      KEYCLOAK_ISSUER_URI: ${KEYCLOAK_PUBLIC_URL:-http://localhost:8180}/realms/lxp
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/lxp/protocol/openid-connect/certs
    ports:
      - "8085:8085"
    volumes:
      - ./infrastructure/logs:/logs
    depends_on:
      consul-1:
        condition: service_healthy
      config-server:
        condition: service_healthy
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      # PG 연동 (D-39)
      mock-pg:
        condition: service_healthy
    networks: [lxp-net]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8085/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s


networks:
  lxp-net:
    name: lxp-net
    driver: bridge

volumes:
  keycloak-data:
  grafana-data:
  loki-data:
  alloy-data:
