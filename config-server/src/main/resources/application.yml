spring:
  application:
    name: config-server
  profiles:
    active: native
  cloud:
    config:
      server:
        native:
          search-locations: ${CONFIG_SEARCH_LOCATIONS:file:../config-repo}
    consul:
      host: ${CONSUL_HOST:localhost}
      port: ${CONSUL_PORT:8500}
      discovery:
        instance-id: ${spring.application.name}-${HOSTNAME:${random.value}}
        prefer-ip-address: true
        health-check-path: /actuator/health
        health-check-interval: 10s
        # config-repo/application.yml에도 같은 값이 있지만 여기 다시 적는다 (D-43).
        # config-server는 자기 자신에게서 설정을 받아올 수 없어, 공용 파일에만 두면
        # 6개 서비스 중 config-server 하나만 조용히 빠진다.
        query-passing: true
        health-check-critical-timeout: 1m

server:
  port: ${SERVER_PORT:8888}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
    baggage:
      correlation:
        fields: request-id,user-id
      remote-fields: request-id,user-id
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}

logging:
  file:
    name: ${LOG_DIR:../infrastructure/logs}/${spring.application.name}.log
  pattern:
    correlation: "[%X{traceId:-},%X{spanId:-}] "
  # config-repo/application.yml과 같은 내용을 여기 한 번 더 둔다 (D-64).
  # 위 query-passing(D-43)과 같은 이유다 — config-server는 자기 자신에게서
  # 설정을 받아올 수 없어, 공용 파일에만 두면 6개 중 이것 하나만 평문으로
  # 남는다. 실제로 그렇게 됐고, Loki에서 config-server만 level 라벨이
  # 없는 채로 섞여 파싱 오류를 냈다.
  structured:
    format:
      file: ecs
    ecs:
      service:
        name: ${spring.application.name}
