# CI — Jenkins
#
#   docker compose -f compose.ci.yaml up -d
#   초기 비밀번호: docker compose -f compose.ci.yaml exec jenkins cat /var/jenkins_home/secrets/initialAdminPassword
#
# 호스트 포트는 9080. Jenkins 기본값 8080은 gateway와 충돌한다.
#
# 파이프라인이 docker build를 하므로 호스트의 Docker 소켓을 마운트한다(DooD).
# 컨테이너가 호스트 Docker를 그대로 조종할 수 있다는 뜻이라, 로컬 학습 환경에서만 쓴다.

services:

  # 이미지 레지스트리 (D-50).
  #
  # Docker Hub 대신 로컬에 둔다 — 계정 없이도 push/pull과 자격증명 처리를
  # 그대로 배울 수 있고, 학습용 이미지를 공개 레지스트리에 올리지 않아도 된다.
  # Docker Hub로 바꾸려면 .env의 REGISTRY_HOST와 자격증명만 교체하면 된다.
  #
  # 호스트 5000 포트로 낸다. Jenkins의 docker CLI는 호스트 데몬을 쓰므로(DooD)
  # localhost:5000이 곧 이 컨테이너다. Docker는 localhost 레지스트리를
  # 자동으로 insecure로 취급하니 TLS 인증서나 daemon.json 수정이 필요 없다.
  registry:
    image: registry:2
    container_name: lxp-registry
    environment:
      REGISTRY_AUTH: htpasswd
      REGISTRY_AUTH_HTPASSWD_REALM: "LXP Registry"
      REGISTRY_AUTH_HTPASSWD_PATH: /auth/htpasswd
      # 삭제 API를 켠다. 학습 중 태그를 지우고 다시 밀어볼 일이 있다.
      REGISTRY_STORAGE_DELETE_ENABLED: "true"
    volumes:
      - ./infrastructure/registry/htpasswd:/auth/htpasswd:ro
      - registry-data:/var/lib/registry
    ports:
      - "${REGISTRY_PORT:-5000}:5000"
    restart: on-failure:3
    healthcheck:
      # 인증을 켰으므로 / 는 401을 준다. 401이 곧 "살아 있고 인증을 요구한다"다.
      test: ["CMD-SHELL", "wget -q -S -O /dev/null http://localhost:5000/v2/ 2>&1 | grep -q '401'"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks: [lxp-net]

  jenkins:
    # 공식 이미지에는 docker CLI가 없어서 "Docker 이미지 빌드" 단계가
    # `docker: not found`로 실패한다. ci/Dockerfile에서 CLI만 얹는다 (D-38).
    build:
      context: ./ci
      dockerfile: Dockerfile
    image: lxp/jenkins:2.568.1-jdk21
    container_name: lxp-jenkins
    user: root                       # 호스트 docker.sock이 root 소유라 필요하다
    environment:
      TZ: Asia/Seoul
      # 잡·보안 설정은 ci/jenkins.yaml이 소유한다 (D-40).
      # 비밀번호를 파일에 적지 않고 여기서 주입한다.
      JENKINS_ADMIN_ID: ${JENKINS_ADMIN_ID:-admin}
      JENKINS_ADMIN_PASSWORD: ${JENKINS_ADMIN_PASSWORD:-admin}
      # webhook을 쓰는 동안 외부에서 닿는 주소 (D-47).
      # cloudflared 무료 터널은 켤 때마다 주소가 바뀌므로 .env에서 주입한다.
      JENKINS_URL: ${JENKINS_URL:-http://localhost:9080/}
      # 레지스트리 자격증명 (D-50). jenkins.yaml이 이 값으로
      # registry-credentials를 만들고, Jenkinsfile은 id로만 참조한다.
      REGISTRY_USERNAME: ${REGISTRY_USERNAME:-lxp}
      REGISTRY_PASSWORD: ${REGISTRY_PASSWORD:-}
      # 파이프라인이 push할 주소. Docker Hub로 옮기면 이 값만 바꾼다.
      REGISTRY_HOST: ${REGISTRY_HOST:-localhost:5000}
    ports:
      - "9080:8080"
      - "50000:50000"                # 에이전트 접속용
    volumes:
      - jenkins-data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      # JCasC 설정. 고치고 컨테이너만 재시작하면 반영된다.
      - ./ci/jenkins.yaml:/var/jenkins_home/casc/jenkins.yaml:ro
    networks: [lxp-net]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/login"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s

networks:
  lxp-net:
    name: lxp-net
    driver: bridge

volumes:
  jenkins-data:
  registry-data:
