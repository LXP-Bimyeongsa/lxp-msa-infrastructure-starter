# 테스트는 H2 인메모리 + RabbitMQ 미접속으로 돌린다.
spring:
  config:
    import: "optional:configserver:"
  cloud:
    consul:
      enabled: false
      discovery:
        enabled: false
  datasource:
    url: jdbc:h2:mem:payment_db;MODE=MySQL;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
  rabbitmq:
    listener:
      simple:
        auto-startup: false

outbox:
  relay:
    enabled: false
    exchange: payment.events

management:
  zipkin:
    tracing:
      export:
        enabled: false

billing:
  period-days: 30
  scheduler:
    # 테스트에서는 스케줄러를 끄고 서비스 메서드를 직접 호출해 검증한다
    enabled: false
